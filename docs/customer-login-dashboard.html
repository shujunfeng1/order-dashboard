<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客户登录、拜访及转化看板</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
:root{--navy:#183b66;--navy-2:#24517f;--teal:#2f7d78;--gold:#c4a35a;--orange:#c7532c;--ink:#20252b;--muted:#7b838c;--line:#e5e8eb;--soft:#f5f7f8;--white:#fff;--font:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#fff;color:var(--ink);font-family:var(--font);letter-spacing:0}button,select,input{font:inherit;letter-spacing:0}.topbar{background:var(--navy);color:#fff;padding:18px 32px;display:flex;align-items:center;justify-content:space-between;gap:24px}.brand h1{margin:0;font-size:21px;font-weight:500}.brand p{margin:7px 0 0;color:rgba(255,255,255,.58);font-size:12px}.top-actions{display:flex;align-items:center;gap:14px}.data-time{font-size:12px;color:rgba(255,255,255,.58);white-space:nowrap}.dashboard-nav{display:flex;border:1px solid rgba(255,255,255,.28)}.dashboard-nav a,.dashboard-nav span{padding:8px 14px;color:rgba(255,255,255,.76);font-size:12px;text-decoration:none;white-space:nowrap}.dashboard-nav a:hover{color:#fff;background:rgba(255,255,255,.08)}.dashboard-nav .active{background:#fff;color:var(--navy);font-weight:600}.page{max-width:1440px;margin:0 auto;padding:34px 34px 64px}.section-label{font-size:12px;color:var(--muted);margin-bottom:12px}.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);border-top:1px solid var(--line);border-bottom:1px solid var(--line);margin-bottom:24px}.kpi{padding:22px 18px;border-right:1px solid var(--line);min-width:0;min-height:108px;display:flex;flex-direction:column;justify-content:center}.kpi:last-child{border-right:0}.kpi-label{font-size:12px;line-height:1.4;color:var(--muted);margin-bottom:10px;white-space:nowrap}.kpi-value{font-family:var(--font);font-size:30px;font-weight:500;line-height:1;color:var(--navy);white-space:nowrap;font-variant-numeric:tabular-nums}.kpi:nth-child(4) .kpi-value,.kpi:nth-child(6) .kpi-value{color:var(--orange)}.impact-band{display:grid;grid-template-columns:1.2fr 1fr 1fr 1fr;align-items:stretch;background:var(--soft);border-left:3px solid var(--teal);margin-bottom:26px}.impact-copy{padding:16px 18px}.impact-copy strong{display:block;font-size:14px;color:var(--navy);margin-bottom:7px}.impact-copy span{font-size:12px;color:var(--muted);line-height:1.6}.impact-stat{padding:16px 18px;border-left:1px solid #dde2e5}.impact-stat label{display:block;font-size:11px;color:var(--muted);margin-bottom:8px}.impact-stat b{font-size:22px;font-weight:500;color:var(--ink)}.impact-stat.uplift b{color:var(--teal)}.filters{display:flex;align-items:center;gap:18px;flex-wrap:wrap;padding:14px 0;margin-bottom:26px;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}.filter{display:flex;align-items:center;gap:8px}.filter label{font-size:12px;color:var(--muted)}.filter select{height:34px;min-width:132px;border:1px solid #d9dde1;background:#fff;padding:0 30px 0 10px;color:var(--ink);outline:none;font-size:12px}.filter select:focus{border-color:var(--navy-2)}.reset{height:34px;padding:0 14px;border:1px solid #d9dde1;background:#fff;color:var(--muted);cursor:pointer}.reset:hover{color:var(--navy);border-color:var(--navy)}.filter-summary{margin-left:auto;font-size:12px;color:#a0a6ac}.chart-grid{display:grid;grid-template-columns:1.35fr 1fr .92fr;border-top:1px solid var(--line);border-bottom:1px solid var(--line);margin-bottom:34px}.chart-panel{padding:18px 18px 12px;border-right:1px solid var(--line);min-width:0}.chart-panel:last-child{border-right:0}.chart-head{height:36px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;border-bottom:1px solid #eef0f2;margin-bottom:10px}.chart-title{font-size:15px;font-weight:500;color:#30363c;white-space:nowrap}.metric-toggle{display:flex;flex-shrink:0}.metric-btn{border:1px solid #dfe3e6;background:#fff;color:var(--muted);font-size:11px;padding:5px 9px;cursor:pointer;white-space:nowrap}.metric-btn+.metric-btn{border-left:0}.metric-btn.active{background:var(--navy);border-color:var(--navy);color:#fff}.chart{height:300px;width:100%}.table-section{margin-top:8px}.table-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:12px}.table-title h2{font-size:18px;font-weight:500;margin:0 0 7px;color:var(--navy)}.table-title p{margin:0;font-size:12px;color:var(--muted)}.table-tools{display:flex;align-items:center;gap:10px}.search{height:34px;width:220px;border:1px solid #d9dde1;padding:0 10px;outline:none}.search:focus{border-color:var(--navy)}.table-wrap{max-height:500px;overflow:auto;border-top:2px solid var(--navy);border-bottom:1px solid var(--line)}table{width:100%;border-collapse:collapse;font-size:12px}thead th{position:sticky;top:0;z-index:2;background:var(--navy);color:#fff;font-weight:500;padding:11px 12px;text-align:right;white-space:nowrap;cursor:pointer}thead th:first-child,thead th:nth-child(2){text-align:left}tbody td{padding:10px 12px;border-bottom:1px solid #eceff1;text-align:right;white-space:nowrap}tbody td:first-child,tbody td:nth-child(2){text-align:left}tbody tr:nth-child(even){background:#fafbfb}tbody tr:hover{background:#f0f5f7}.rate-good{color:var(--teal);font-weight:600}.rate-order{color:var(--orange);font-weight:600}.empty{text-align:center!important;color:var(--muted);padding:36px!important}.table-foot{display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-size:12px;color:var(--muted)}.legend-note{display:flex;gap:14px;flex-wrap:wrap}.legend-note span:before{content:"";display:inline-block;width:8px;height:8px;margin-right:5px}.legend-note .login:before{background:var(--navy)}.legend-note .visit:before{background:var(--teal)}.legend-note .cart:before{background:var(--gold)}.legend-note .order:before{background:var(--orange)}
@media(max-width:1180px){.kpi-grid{grid-template-columns:repeat(3,1fr)}.kpi:nth-child(3){border-right:0}.kpi:nth-child(-n+3){border-bottom:1px solid var(--line)}.chart-grid{grid-template-columns:1fr 1fr}.chart-panel:nth-child(2){border-right:0}.chart-panel:last-child{grid-column:1/-1;border-top:1px solid var(--line)}}
@media(max-width:760px){.topbar{padding:16px;align-items:flex-start;flex-direction:column}.top-actions{width:100%;flex-wrap:wrap}.page{padding:22px 16px 48px}.kpi-grid{grid-template-columns:repeat(2,1fr)}.kpi:nth-child(2n){border-right:0}.kpi:nth-child(-n+4){border-bottom:1px solid var(--line)}.kpi-value{font-size:25px}.impact-band{grid-template-columns:1fr 1fr}.impact-copy{grid-column:1/-1}.impact-stat:nth-of-type(2){border-left:0}.filters{gap:10px}.filter{width:100%}.filter select{flex:1}.filter-summary{margin-left:0;width:100%}.chart-grid{grid-template-columns:1fr}.chart-panel,.chart-panel:nth-child(2){border-right:0;border-bottom:1px solid var(--line)}.chart-panel:last-child{grid-column:auto;border-bottom:0}.chart-head{height:auto;min-height:36px;flex-wrap:wrap}.chart{height:260px}.table-head{align-items:flex-start;flex-direction:column}.search{width:100%}.table-tools{width:100%}.table-wrap{max-height:430px}}
</style>
</head>
<body>
<header class="topbar">
  <div class="brand"><h1>客户登录、拜访及转化看板</h1><p id="headerMeta"></p></div>
  <div class="top-actions"><nav class="dashboard-nav"><a href="./">卡单数据看板</a><span class="active">登录转化看板</span></nav></div>
</header>
<main class="page">
  <div class="section-label">核心指标</div>
  <section class="kpi-grid">
    <div class="kpi"><div class="kpi-label">今日登录客户数</div><div class="kpi-value" id="kpiLogin">-</div></div>
    <div class="kpi"><div class="kpi-label">拜访客户数</div><div class="kpi-value" id="kpiVisit">-</div></div>
    <div class="kpi"><div class="kpi-label">加购客户数</div><div class="kpi-value" id="kpiCart">-</div></div>
    <div class="kpi"><div class="kpi-label">下单客户数</div><div class="kpi-value" id="kpiOrder">-</div></div>
    <div class="kpi"><div class="kpi-label">拜访覆盖率</div><div class="kpi-value" id="kpiVisitRate">-</div></div>
    <div class="kpi"><div class="kpi-label">下单转化率</div><div class="kpi-value" id="kpiOrderRate">-</div></div>
  </section>
  <section class="impact-band">
    <div class="impact-copy"><strong>拜访对成交转化的带动</strong><span>按客户ID去重；拜访定义为上门拜访或电话拜访任一为“是”。</span></div>
    <div class="impact-stat"><label>加购率</label><b id="impactCartRate">-</b></div>
    <div class="impact-stat"><label>拜访客户下单率</label><b id="impactVisitedRate">-</b></div>
    <div class="impact-stat uplift"><label>相较未拜访提升</label><b id="impactUplift">-</b></div>
  </section>
  <section class="filters">
    <div class="filter"><label>大区</label><select id="filterRegion"></select></div>
    <div class="filter"><label>业态</label><select id="filterIndustry"></select></div>
    <div class="filter"><label>省区</label><select id="filterProvince"></select></div>
    <button class="reset" id="resetBtn">重置</button>
    <div class="filter-summary" id="filterSummary"></div>
  </section>
  <section class="chart-grid">
    <article class="chart-panel"><div class="chart-head"><span class="chart-title" id="volumeTitle">大区客户行为量级</span><div class="metric-toggle" id="volumeToggle"><button class="metric-btn active" data-metric="login">登录</button><button class="metric-btn" data-metric="visit">拜访</button><button class="metric-btn" data-metric="cart">加购</button><button class="metric-btn" data-metric="order">下单</button></div></div><div class="chart" id="volumeChart"></div></article>
    <article class="chart-panel"><div class="chart-head"><span class="chart-title" id="rateTitle">大区转化效率</span></div><div class="chart" id="rateChart"></div></article>
    <article class="chart-panel"><div class="chart-head"><span class="chart-title">拜访客户成交对比</span></div><div class="chart" id="impactChart"></div></article>
  </section>
  <section class="table-section">
    <div class="table-head"><div class="table-title"><h2>省区维度明细</h2><p>点击表头可排序，筛选条件与上方图表保持一致。</p></div><div class="table-tools"><input class="search" id="searchInput" placeholder="搜索大区或省区"></div></div>
    <div class="table-wrap"><table><thead><tr><th data-sort="region">大区</th><th data-sort="province">省区</th><th data-sort="login">登录客户数</th><th data-sort="visit">拜访客户数</th><th data-sort="cart">加购客户数</th><th data-sort="order">下单客户数</th><th data-sort="visitRate">拜访覆盖率</th><th data-sort="cartRate">加购率</th><th data-sort="orderRate">下单转化率</th></tr></thead><tbody id="tableBody"></tbody></table></div>
    <div class="table-foot"><div class="legend-note"><span class="login">登录</span><span class="visit">拜访</span><span class="cart">加购</span><span class="order">下单</span></div></div>
  </section>
</main>
<script>
let DATA=null;
const COLORS={login:'#183b66',visit:'#2f7d78',cart:'#c4a35a',order:'#c7532c'};
let volumeMetric='login';let sortKey='login';let sortDir='desc';let searchText='';
let volumeChart=echarts.init(document.getElementById('volumeChart'));let rateChart=echarts.init(document.getElementById('rateChart'));let impactChart=echarts.init(document.getElementById('impactChart'));
const fmt=n=>String(Math.round(Number(n||0)));const pct=n=>(Number(n||0)*100).toFixed(1)+'%';
function cleanDimension(value,fallback){const text=String(value??'').trim();return !text||/^(nan|none|null)$/i.test(text)?fallback:text}
function normalizeRows(){DATA.rows.forEach(row=>{row.region=cleanDimension(row.region,'公海');row.province=cleanDimension(row.province,'公海');row.industry=cleanDimension(row.industry,'未知')})}
function sumRows(rows){return rows.reduce((a,r)=>{a.login+=r.login;a.visit+=r.visit;a.cart+=r.cart;a.order+=r.order;a.visit_order+=r.visit_order;a.nonvisit_order+=r.nonvisit_order;a.nonvisit_base+=r.nonvisit_base;return a},{login:0,visit:0,cart:0,order:0,visit_order:0,nonvisit_order:0,nonvisit_base:0})}
function options(select,values){select.innerHTML='<option value="">全部</option>'+values.map(v=>'<option value="'+v+'">'+v+'</option>').join('')}
function unique(field,rows){return [...new Set(rows.map(r=>r[field]))].sort((a,b)=>a.localeCompare(b,'zh-CN'))}
async function init(){try{const response=await fetch('./customer_login_data.json?ts='+Date.now(),{cache:'no-store'});if(!response.ok)throw new Error('HTTP '+response.status);DATA=await response.json();normalizeRows();document.getElementById('headerMeta').textContent='数据日期：'+DATA.data_date+' '+DATA.data_time;options(document.getElementById('filterRegion'),unique('region',DATA.rows));options(document.getElementById('filterIndustry'),unique('industry',DATA.rows));updateProvinceOptions();bind();render()}catch(error){console.error('客户登录看板数据加载失败',error);document.getElementById('headerMeta').textContent='数据加载失败，请稍后刷新';document.getElementById('tableBody').innerHTML='<tr><td colspan="9" class="empty">暂时无法获取最新数据</td></tr>'}}
function bind(){['filterRegion','filterIndustry','filterProvince'].forEach(id=>document.getElementById(id).addEventListener('change',()=>{if(id==='filterRegion')updateProvinceOptions();render()}));document.getElementById('resetBtn').addEventListener('click',()=>{document.getElementById('filterRegion').value='';document.getElementById('filterIndustry').value='';updateProvinceOptions();document.getElementById('filterProvince').value='';searchText='';document.getElementById('searchInput').value='';render()});document.querySelectorAll('#volumeToggle button').forEach(btn=>btn.addEventListener('click',()=>{volumeMetric=btn.dataset.metric;document.querySelectorAll('#volumeToggle button').forEach(b=>b.classList.toggle('active',b===btn));renderCharts(filteredRows())}));document.getElementById('searchInput').addEventListener('input',e=>{searchText=e.target.value.trim().toLowerCase();renderTable(filteredRows())});document.querySelectorAll('thead th').forEach(th=>th.addEventListener('click',()=>{const key=th.dataset.sort;if(sortKey===key)sortDir=sortDir==='asc'?'desc':'asc';else{sortKey=key;sortDir=key==='region'||key==='province'?'asc':'desc'}renderTable(filteredRows())}));window.addEventListener('resize',()=>{volumeChart.resize();rateChart.resize();impactChart.resize()})}
function updateProvinceOptions(){const region=document.getElementById('filterRegion').value;const current=document.getElementById('filterProvince').value;const rows=region?DATA.rows.filter(r=>r.region===region):DATA.rows;options(document.getElementById('filterProvince'),unique('province',rows));if([...document.getElementById('filterProvince').options].some(o=>o.value===current))document.getElementById('filterProvince').value=current}
function filteredRows(){const region=document.getElementById('filterRegion').value;const industry=document.getElementById('filterIndustry').value;const province=document.getElementById('filterProvince').value;return DATA.rows.filter(r=>(!region||r.region===region)&&(!industry||r.industry===industry)&&(!province||r.province===province))}
function aggregate(rows,field){const map={};rows.forEach(r=>{const key=r[field];if(!map[key])map[key]=[];map[key].push(r)});return Object.entries(map).map(([name,items])=>({name,...sumRows(items)}))}
function render(){const rows=filteredRows();const m=sumRows(rows);document.getElementById('kpiLogin').textContent=fmt(m.login);document.getElementById('kpiVisit').textContent=fmt(m.visit);document.getElementById('kpiCart').textContent=fmt(m.cart);document.getElementById('kpiOrder').textContent=fmt(m.order);document.getElementById('kpiVisitRate').textContent=pct(m.login?m.visit/m.login:0);document.getElementById('kpiOrderRate').textContent=pct(m.login?m.order/m.login:0);const visitedRate=m.visit?m.visit_order/m.visit:0;const nonVisitedRate=m.nonvisit_base?m.nonvisit_order/m.nonvisit_base:0;document.getElementById('impactCartRate').textContent=pct(m.login?m.cart/m.login:0);document.getElementById('impactVisitedRate').textContent=pct(visitedRate);document.getElementById('impactUplift').textContent=m.visit&&m.nonvisit_base?((visitedRate-nonVisitedRate>=0?'+':'')+((visitedRate-nonVisitedRate)*100).toFixed(1)+'pp'):'--';document.getElementById('filterSummary').textContent='当前 '+fmt(m.login)+' 位登录客户';renderCharts(rows);renderTable(rows)}
function renderCharts(rows){const selectedRegion=document.getElementById('filterRegion').value;const dim=selectedRegion?'province':'region';const label=selectedRegion?'省区':'大区';document.getElementById('volumeTitle').textContent=label+'客户行为量级';document.getElementById('rateTitle').textContent=label+'转化效率';let groups=aggregate(rows,dim).sort((a,b)=>b[volumeMetric]-a[volumeMetric]);if(groups.length>14)groups=groups.slice(0,14);const metricLabels={login:'登录客户数',visit:'拜访客户数',cart:'加购客户数',order:'下单客户数'};volumeChart.setOption({animationDuration:350,grid:{left:44,right:18,top:18,bottom:58},tooltip:{trigger:'axis',axisPointer:{type:'shadow'},formatter:p=>{const g=groups.find(x=>x.name===p[0].name);return '<b>'+g.name+'</b><br>登录客户数：'+fmt(g.login)+'<br>拜访客户数：'+fmt(g.visit)+'<br>加购客户数：'+fmt(g.cart)+'<br>下单客户数：'+fmt(g.order)}},xAxis:{type:'category',data:groups.map(g=>g.name),axisLabel:{interval:0,rotate:groups.length>5?20:0,color:'#7b838c',fontSize:11},axisLine:{lineStyle:{color:'#dfe3e6'}},axisTick:{show:false}},yAxis:{type:'value',axisLabel:{color:'#9ba1a7',formatter:v=>String(v)},splitLine:{lineStyle:{color:'#f0f2f3'}}},series:[{name:metricLabels[volumeMetric],type:'bar',data:groups.map(g=>g[volumeMetric]),barMaxWidth:38,itemStyle:{color:COLORS[volumeMetric]},label:{show:true,position:'top',fontSize:10,color:'#777',formatter:p=>fmt(p.value)}}]},true);
let rateGroups=aggregate(rows,dim).sort((a,b)=>b.login-a.login);if(rateGroups.length>12)rateGroups=rateGroups.slice(0,12);rateChart.setOption({animationDuration:350,color:[COLORS.visit,COLORS.order],grid:{left:48,right:16,top:28,bottom:58},legend:{top:0,itemWidth:9,itemHeight:9,textStyle:{fontSize:10,color:'#737b83'}},tooltip:{trigger:'axis',formatter:p=>'<b>'+p[0].axisValue+'</b><br>'+p.map(x=>x.marker+x.seriesName+'：'+x.value.toFixed(1)+'%').join('<br>')},xAxis:{type:'category',data:rateGroups.map(g=>g.name),axisLabel:{interval:0,rotate:rateGroups.length>5?20:0,color:'#7b838c',fontSize:11},axisLine:{lineStyle:{color:'#dfe3e6'}},axisTick:{show:false}},yAxis:{type:'value',axisLabel:{formatter:'{value}%',color:'#9ba1a7'},splitLine:{lineStyle:{color:'#f0f2f3'}}},series:[{name:'拜访覆盖率',type:'bar',data:rateGroups.map(g=>g.login?g.visit/g.login*100:0),barMaxWidth:20},{name:'下单转化率',type:'bar',data:rateGroups.map(g=>g.login?g.order/g.login*100:0),barMaxWidth:20}]},true);
const m=sumRows(rows);const visitedRate=m.visit?m.visit_order/m.visit*100:0;const nonVisitedRate=m.nonvisit_base?m.nonvisit_order/m.nonvisit_base*100:0;impactChart.setOption({animationDuration:350,grid:{left:92,right:26,top:42,bottom:30},tooltip:{trigger:'axis',axisPointer:{type:'shadow'},formatter:p=>p[0].name+'：'+p[0].value.toFixed(1)+'%'},xAxis:{type:'value',max:Math.max(60,Math.ceil(Math.max(visitedRate,nonVisitedRate)/10)*10),axisLabel:{formatter:'{value}%',color:'#9ba1a7'},splitLine:{lineStyle:{color:'#f0f2f3'}}},yAxis:{type:'category',data:['未拜访客户','拜访客户'],axisLabel:{color:'#555'},axisTick:{show:false},axisLine:{show:false}},series:[{type:'bar',data:[{value:nonVisitedRate,itemStyle:{color:'#aeb5ba'}},{value:visitedRate,itemStyle:{color:COLORS.visit}}],barWidth:28,label:{show:true,position:'right',formatter:p=>p.value.toFixed(1)+'%',color:'#555'}}],graphic:[{type:'text',right:18,top:10,style:{text:m.visit&&m.nonvisit_base?'提升 '+((visitedRate-nonVisitedRate)>=0?'+':'')+(visitedRate-nonVisitedRate).toFixed(1)+'pp':'拜访样本不足',fill:COLORS.visit,font:'600 13px sans-serif'}}]},true)}
function tableRows(rows){const map={};rows.forEach(r=>{const key=r.region+'\u0000'+r.province;if(!map[key])map[key]=[];map[key].push(r)});return Object.values(map).map(items=>{const g=sumRows(items);return{region:items[0].region,province:items[0].province,...g,visitRate:g.login?g.visit/g.login:0,cartRate:g.login?g.cart/g.login:0,orderRate:g.login?g.order/g.login:0}})}
function renderTable(rows){let data=tableRows(rows);if(searchText)data=data.filter(r=>(r.region+' '+r.province).toLowerCase().includes(searchText));data.sort((a,b)=>{const av=a[sortKey],bv=b[sortKey];if(typeof av==='string')return(sortDir==='asc'?1:-1)*av.localeCompare(bv,'zh-CN');return sortDir==='asc'?av-bv:bv-av});const body=document.getElementById('tableBody');body.innerHTML=data.length?data.map(r=>'<tr><td>'+r.region+'</td><td>'+r.province+'</td><td>'+fmt(r.login)+'</td><td>'+fmt(r.visit)+'</td><td>'+fmt(r.cart)+'</td><td>'+fmt(r.order)+'</td><td class="rate-good">'+pct(r.visitRate)+'</td><td>'+pct(r.cartRate)+'</td><td class="rate-order">'+pct(r.orderRate)+'</td></tr>').join(''):'<tr><td colspan="9" class="empty">无匹配数据</td></tr>'}
init();
</script>
</body>
</html>
