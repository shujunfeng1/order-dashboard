name: 更新卡单看板数据

on:
  schedule:
    # 9:30 北京时间 = 1:30 UTC
    - cron: '30 1 * * *'
    # 10:00 北京时间 = 2:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 执行数据管道
        env:
          IMAP_SERVER: ${{ secrets.IMAP_SERVER }}
          IMAP_PORT: ${{ secrets.IMAP_PORT }}
          EMAIL_ACCOUNT: ${{ secrets.EMAIL_ACCOUNT }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          OUTPUT_DIR: docs
          EXPORTS_DIR: docs
        run: python pipeline/run_pipeline.py

      - name: 提交更新数据
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/dashboard_data.json docs/index.html docs/*.xlsx
          if git diff --staged --quiet; then
            echo "数据未变化，跳过提交"
          else
            git commit -m "自动更新看板数据 $(date -u -d '+8 hours' '+%Y-%m-%d %H:%M')"
            git push
          fi
